# ================ GARDEN BLOCK (ANGRY SONG) ================
# Garden vines are blocking the south of garden to PYREFLY FOREST. This need some visual prompt on map as well to notify the player it's open more clearly.
# This dialogue assumes that Sweetheart has left the party already, especially since I don't think you can reach this point again until after you find her.
# Question mark appears above Spaceboy's head

garden_block_1:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 38
    text: \n<SPACEBOYHmm... la salida por aquí está bloqueada.\. Parece que se ha llenado de maleza desde la última vez que estuve aquí.

garden_block_2:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 2
    text: \n<DOUGHIE>Oho?\. Estuviste aquí antes, SPACEBOY?

garden_block_3:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 44
    text: \n<SPACEBOY>Sí, visité este lugar una vez cuando SWEETHEART y yo éramos novios.

garden_block_4:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 44
    text: \n<SPACEBOY>No... fue la experiencia más agradable.

garden_block_5:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 4
    text: \n<DOUGHIE>Me lo puedo imaginar... 

# Dialogue for interacting with song area. 

garden_block_6:
    text: Este BROTOPO parece estar mirando al vacío con la mente en otra parte.... 

# No yes/no option, just small menu of songs

# Incorrect Song

garden_block_8:
    text: Este BROTOPO no responde.

# Correct Song

garden_block_9:
    text: Este BROTOPO está vigorizado con pasión y rabia!

# After
garden_block_10:
    text: \n<MARSHA>Honestamente...\. he estado procrastinando para quitar las malas hierbas todo este tiempo.

