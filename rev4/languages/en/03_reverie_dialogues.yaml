# ================ Pyrefly Trio ================

# Pyrefly trio is just 3 strong enemies troop
trio_1:
    text: \n<FIERY>Hey!\! What you doin' there!\! Can't you see we're busy plotting!

trio_2:
    text: \n<VAMPYRE>Uhh, can you tone it down a bit...?\! I don't like loud noises...\! Can't we just mind our own business...

trio_3:
    text: \n<FIERY>They came to us first!\! You know what that means!\! It's time for a prank!

trio_4:
    text: \n<VAMPYRE>Your pranks just cause distress! Burning people isn't funny...\! should that not be obvious?

trio_5:
    text: \n<IRIS>Good grief, enough talking.\! Let's just get this over with.

trio_6:
    text: \n<VAMPYRE>Wait,\. what do you m-\^

# Fight
trio_7:
    text: \n<VAMPYRE>Wahh,\. sorry!\! Please excuse my friends!\! I'm sure they don't mean to do anything bad to you all!

trio_8:
    text: \n<VAMPYRE>Please,\. take this as a token of apology!

# You got
trio_9:
    text: \n<VAMPYRE>It's...\. one of the spell book I have.\! It does lightning stuff...\. it might not be that good though...

# After talk
trio_a1:
    text: \n<FIERY>Seriously man, you have to up your game.

trio_a2:
    text: \n<VAMPYRE>Wahh, sorry!\. But no one else is doing healing duty!

trio_a3:
    text: \n<IRIS>Just think of someone you really hate and then channel your rage.\! Electrocute them to death or something.\! Don't you ever have someone you really hate?

trio_a4:
    text: \n<VAMPYRE>Uh, no?\. Why?

trio_a5:
    text: \n<IRIS>Geez Louise, you're more helpless than a baby.
