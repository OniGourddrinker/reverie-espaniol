# ================ TRAP DOOR SHORTCUT (ANGRY SONG) ================
#PUZZLE MOLE 1 (Top Left) The "really really really" guy
#Now just need to be annoyed to move on left trapdoor

goldmole_alex_1:
    text: \n<ALEX EL ESTIMADO>Solía ser un miembro de la estimada élite...\! Tenía un código especial y todo.

goldmole_alex_2:
    text: \n<ALEX EL ESTIMADO>¡Pero luego el castillo fue destrozado así sin más!\! ¿Qué se supone que debo hacer ahora?

goldmole_alex_3:
    text: \n<ALEX EL ESTIMADO>Oh, ¿Quieres que me mueva?\! Like really want me to move?\! ¿Realmente quieres que me mueva?\! ¿Realmente, realmente quieres que me mueva?

goldmole_alex_4:
    text: Este BROTOPO parece estar un poco molesto con la situación actual....

goldmole_alex_4_1:
    text: ... Tanto como para ni siquiera notarte.

goldmole_alex_4_2:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 21
    text: \n<SWEETHEART>Tal insolencia...\. Y de mi propio caballero...

# Wrong
goldmole_alex_5:
    text: \n<ALEX EL ESTIMADO>¿Qué se suponía que era eso?\! ¿Acaso se supone que me va a mejorar el ánimo?

# Correct
goldmole_alex_6:
    text: \n<ALEX EL ESTIMADO>¿Qué demonios es esa canción?\! ¡Solo por eso, voy a estorbarte aún más!\! Hmph!

# After
goldmole_alex_7:
    text: \n<ALEX EL ESTIMADO>¡Toma eso!\! Eso te enseñará a mostrarme música de mala calidad! 

# ================ HEDGE ITEM (SAD SONG) ================
#PUZZLE MOLE 4 (Top Right) Ranting one about password are stupid
#Now just sad in top right garden

goldmole_helen_1:
    text: \n<HELEN LA CALAMITOSA>Solía estar súper ocupada parada aquí, siendo parte de la élite calamitosa...\!  pero con el castillo en ruinas, ya no tengo ninguna contraseña que custodiar...

goldmole_helen_2:
    text: \n<HELEN LA CALAMITOSA>La contraseña podrá ser estúpida...\.  pero ahora que no tengo trabajo,\. siento que mi vida está más sin rumbo que nunca.

goldmole_helen_3:
    text: Este BROTOPO parece estar un poco desanimado con la situación actual... 

# Wrong
goldmole_helen_4:
    text: \n<HELEN LA CALAMITOSA>...¿Para qué fue eso exactamente?

# Correct
goldmole_helen_5:
    text: \n<HELEN LA CALAMITOSA>Ah, eso me hizo sentir un poco mejor.\! Oh, ¿Estaba estorbando? Me moveré ahora.

# After
goldmole_helen_6:
    text: \n<HELEN LA CALAMITOSA>Me siento un poco mejor ahora.\! Solo estoy reflexionando sobre mi futuro.

# ================ PAINTING HELL QUEST ================
#PUZZLE MOLE 2 (Bottom Right) Tofu one that doubts
#Now is in dungeon about painting hell

goldmole_brian_1:
    text: \n<BRIAN EL DISTINGUIDO>Cuidado por dónde pisas...\! Estás en la presencia de uno de los miembros de la élite distinguida de SWEETHEART

goldmole_brian_2:
    text: \n<BRIAN EL DISTINGUIDO>Pero a pesar de eso,\. hay un problema con el que una élite como yo no puede lidiar.

goldmole_brian_3:
    text: \n<BRIAN EL DISTINGUIDO>Verás, con el castillo cayendo en la ruina,\. hay una habitación en el calabozo que simplemente pareció abrirse de la nada.

goldmole_brian_4:
    text: \n<BRIAN EL DISTINGUIDO>En la habitación hay un largo pasillo lleno de cuadros...\. y, oh, ¡Qué horror!\! ¡Están todos vivos!

goldmole_brian_5:
    text: \n<BRIAN EL DISTINGUIDO>¡No puedo encargarme de limpiar esa habitación!\!¡¿Y qué pasa si se escapan?!\! ¡Imagínate el terror!

goldmole_brian_6:
    text: \n<BRIAN EL DISTINGUIDO>Sé que no todos ustedes son BROTOPOS...\! pero necesito toda la ayuda que pueda conseguir...

goldmole_brian_7:
    text: \n<BRIAN EL DISTINGUIDO>¿Podrían ayudarme a despejar \c[11]la habitación llena de cuadros\c[0]? \c[11]Hay una pared a tu derecha que puedes atravesar.\c[0].

# Choice YES/NO
# No
goldmole_brian_8:
    text: \n<BRIAN EL DISTINGUIDO>Hmph... Supongo que, aun así, debo cumplir con mi deber como miembro de la élite...

# Yes
goldmole_brian_9:
    text: \n<BRIAN EL DISTINGUIDO>¡Oh, te quedaré eternamente agradecido!\! Si lo haces, ¡me harías un gran favor!

goldmole_brian_10:
    text: \n<BRIAN EL DISTINGUIDO>En cuanto a pruebas... vuelve cuando consigas una \c[4]ROSA ROJA\c[0]... La vi en la parte más profunda de la habitación. Si logras obtenerla, eso será prueba suficiente para mí.

# Not satisfied
goldmole_brian_11:
    text: \n<BRIAN EL DISTINGUIDO>Ah, todavía no tienes una \c[4]ROSA ROJA\c[0].\! No tienes pruebas de que hiciste tu trabajo correctamente.

# Satisfied
goldmole_brian_12:
    text: \n<BRIAN EL DISTINGUIDO>¡Vaya! ¡Lograste obtener la \c[4]ROSA ROJA\c[0]!\! ¡Debes haber limpiado la habitación entera!

goldmole_brian_13:
    text: \n<BRIAN EL DISTINGUIDO>¡Oh, muchísimas gracias!\! ¡Ya no tengo que lidiar con ese terror nunca más!\! Aquí tienes algo que encontré como muestra de agradecimiento.

# > You got item

goldmole_brian_14:
    text: \n<BRIAN EL DISTINGUIDO>Podré descansar en paz para siempre.

# ================ CAROL ================
#PUZZLE MOLE 3 (Bottom Left) Tofu one that is polite
#Carol guards surface
goldmole_carol_1:
    text: \n<CAROL THE ILLUSTRIOUS>Halt there, citizen!\. The surface has become far too dangerous, so I'm on guard duty by this ladder.

goldmole_carol_2:
    text: \n<CAROL THE ILLUSTRIOUS>Altough, I'd much rather go for some exquisite tofu at the restaurant.\. It's so ennuye here!

#Sweetheart talk

goldmole_carol_3:
    text: \n<CAROL THE ILLUSTRIOUS>Oh, grandious duchess!\. It is so good to see you're faring well despite the recent destruction!

goldmole_carol_4:
    text: \n<CAROL THE ILLUSTRIOUS>We knights have been doing our best to keep the order here.\. Please, have these!

# ================================================================
#                    KEEPER OF CASTLE (AFTER SCENE)
# ================================================================

message_koc_1:
    text: \n<KEEPER OF THE CASTLE>You...\| The bright eyed one...\| There is nothing here for you.
    
message_koc_2:
    text: \n<KEEPER OF THE CASTLE>There may have been,\. once.
    
message_koc_3:
    text: \n<KEEPER OF THE CASTLE>But now.\! Now you do not need anything I could give you.
    
message_koc_4:
    text: \n<KEEPER OF THE CASTLE>Any wish you could have is within your grasp.
    
message_koc_5:
    text: \n<KEEPER OF THE CASTLE>You must simply reach out and take it.
    
message_koc_6:
    text: \n<KEEPER OF THE CASTLE>Farewell...\. and good luck.

