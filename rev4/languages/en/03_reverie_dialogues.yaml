# METRO B2 NPCs--------------

message_1:
    text: \n<COWBLIN>Esta estación tiene una temperatura fresca...\. Por fin...

message_2:
    text: \n<TIFANNY DARLING>Ay, Dios mío, estos espíritus malignos no me dejarán en paz..\.Primero mi casa, luego esta estación... y no me dejan en paz, ni siquiera cuando les doy mis clams!

message_3:
    text: \n<PRINCESA FANTASMA>¡Maldición!,\. ¿Dónde estan los demas?\!¡Les dije que vinieran a la estación para que pudiéramos abordar el tren!

message_4:
    text: \n<FANTASMA HÉLICE>Ooohhh...\. este lugar es muy espeluznante....\. Espero que no haya fantasmas malos por aquí....

message_5:
    text: \n<FANTASMA CHISTERA>Caramba, ¿Qué piso era....?\. ¿Tengo el mapa al revés?

message_6:
    text: \n<WEEPING WILLOW>Hola, soy yo...\. Weeping Willow...\! No tienes que prestarme atención,\. Solo estoy aquí esperando el tren...\. Como todos los demás...

message_7_1:
    text: \n<CHICA POCHOCLO>Ir y venir de esta estación no es tan terrible,\. ¡A veces los fantasmas me dan CLAMS a cambio de pochoclo!\. Me pregunto de dónde las conseguirán...

message_7_2:
    text: \n<CHICA POCHOCLO>¿Quieres pochoclo?\. Cuestan 100 clams.\. ¡Siempre llevo mi bandeja extra para emergencias relacionadas con el maíz!

#When buying

message_7_3:
    text: \n<CHICA POCHOCLO>¡Sí!\. ¡Aquí tienes!\. ¡Son POCHOCLO!

message_8:
    text: \n<ESPÍRITU DE LA TAZA>Oohooooooo... ¿Puedes sentir ese escalofriante frío en el aiiire?? Has entrado en nuestra tierra espeluznante...

# BROTOPO VILLAGE NPCs--------------

message_9:
    text: \n<HERMANO TOPO>Mi hermano está a salvo con su TOFU, pero tuvo que huir...\! Espero que los otros colonos estén bien.

message_10:
    text: \n<HERMANO TOPO>\c[11]FALLEN WORLD\c[0] se ha vuelto realmente peligroso.\!  No quería irme, pero tuve que hacerlo...\!  ¡Al menos podré volver a ver a mi hermano!

message_11:
    text: \n<TOPO DE LA FAMILIA>Odio los lunes.

message_12:
    text: \n<CHEF TOPO>Hay TOFU de piña y TOFU de limón, TOFU de coco, TOFU de pimiento....\!

message_12_2:
    text: \n<CHEF TOPO>...Hamburguesa de TOFU, sándwich de TOFU.\! Eso es todo.

#Alternative dialogue (there's a piece of tofu with a sprout)

message_12_3:
    text: \n<CHEF TOPO>¡Ese pedazo de tofu se parece a mí!

message_13:
    text: \n<CHEF TOPO>Tuve un sueño increíble anoche.\! Probé sabores de TOFU de todos los postres....\! Era el paraíso.

message_14:
    text: \n<CHEF TOPO>¿Qué tal si ponemos TOFU en la pizza?\! ...\! No, sería una tontería.\! Peor que el tofu tibio.

message_15:
    text: \n<BROTOPO>Aunque soy un topo paciente, este tipo lleva días metido en esa lavadora...\! ¡Solo quiero lavar mi ropa!

message_16_1:
    text: \n<TOPO DE LA FAMILIA>He viajado por todo el mundo... incluso a las profundidades oscuras de las que nadie regresa... ¿Sabes por qué?\! ¡Por los MEJORES MUEBLES que este mundo puede ofrecer! \!

message_16_2:
    text: \n<TOPO DE LA FAMILIA>Cuando no pude comprarlo, encontré las piezas y lo hice yo mismo. ¡Contemplen los frutos de mi trabajo!

message_16_3:
    text: \n<TOPO DE LA FAMILIA>Mi grandiosa morada es ahora la mejor de la aldea. ¡Ninguna se le compara!\! ¿Tener la mejor casa del pueblo te convierte en el mejor topo? ¡Por supuesto que sí! 

message_17:
    text: \n<TOPO ATLÉTICO>Huff...\. Estoy entrenando para convertirme en un Harold legendario!\! Huff...\. Huff...\. Será difícil, pero me convertiré en el defensor que esta aldea necesita.

message_18:
    text: \n<TOPO GUARDIÁN>¡Alto!\! Es demasiado peligroso afuera.\!  Por tu seguridad, tendrás que quedarte aquí.

message_19:
    text: \n<TOPO DE LA FAMILIA>En estos tiempos oscuros, lo único que me mantiene cuerdo en este mundo es mi falta de autocontrol.

message_20:
    text: \n<BROTOPO>El tofu es cada día más y más valioso\! ¡Asegúrate de llevar siempre un poco contigo!

#Alternative dialogue
message_20_2:
    text: \n<BROTOPO>¡Mi pedido se está demorando mucho! \. Solo pedí cien cubos de tofu asado.\! El servicio al cliente hoy en día es terrible.

message_21:
    text: \n<TOPO PAJARO>Chirp?

message_21_1:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 2
    text: \n<DOUGHIE>Chirp.

message_22:
    text: \n<TOPO HERMOSO>Aunque la situación es grave, eso no me impide ser absolutamente espléndida.

message_23:
    text: \n<TOPO DOBLE>Nos quedamos preguntándonos qué pasó para que todo se arruinara recientemente.

message_24_1:
    text: \n<ESTUDIANTE TOPO>El viejo profesor se largó por culpa de un "apocalipsis", pero está bien.

message_24_2:
    text: \n<ESTUDIANTE TOPO>Nuestro nuevo profesor es mucho mejor, no es tan estricto como el viejo y su plan de estudios ¡es increíble!\! ¡Ahora estoy aprendiendo mucho más!

message_25_1:
    text: \n<ESTUDIANTE TOPO>... A medida que el mundo exterior llega a su fin, también lo hace mi vida personal....

message_25_2:
    text: \n<ESTUDIANTE TOPO>Creí que tenía amigos, pero resulta que....\!  ¡LES ENCANTA EL TOFU! Ahora me pregunto si yo era su amigo, o solo otra comida potencial...

message_26_1:
    text: \n<ESTUDIANTE TOPO>El mundo se está desmoronando afuera, pero yo soy feliz mientras tenga papel y lápices.

message_26_2:
    text: \n<ESTUDIANTE TOPO>Antes de que me diera cuenta, ¡estuve dibujando un cómic completo en clase! ¡No te pierdas los asombrosos relatos de SÚPER BROTOPO!

message_27_1:
    text: \n<TOPO TONTO>Quiero hacer lo correcto por la escuela, así que estoy enseñando mientras todo está un desastre afuera.\!

message_27_2:
    text: \n<TOPO TONTO>Siempre me meto en problemas por usar diferentes BROTOPOS en lugar de números, ¡pero mis estudiantes lo están entendiendo!\. Podría acostumbrarme a esto...

message_28_1:
    text: \n<TOPO DE LA FAMILIA>Aunque la destrucción cercana fue grande y afectó a muchos, incluido el castillo, nosotros los topos que vivíamos en la colonia logramos mantenernos alejados de ella.

message_28_2:
    text: \n<TOPO DE LA FAMILIA>Hemos logrado mantenernos a salvo a pesar del terror.

message_29:
    text: \n<TOPO DOBLE>Nos quedamos preguntándonos qué pasó para que todo se arruinara recientemente.

message_30_1:
    text: \n<BROTOPO>Puedo notar por sus caras y especies distintas que son un grupo de viajeros.\! ¡También puedo darme cuenta de que se han encontrado con muchos BROTOPOS en sus viajes! ¡Apostaría por ello!

message_30_2:
    text: \n<BROTOPO>Viajeros, también apostaría a que no han visto un BROTOPO como yo.\! Mientras la multitud de mis parientes se aglomera por el tofu, o SWEETHEART...\. ¡Yo sigo siendo mi propio topo!\! ¿Han visto alguna vez un topo como yo?

message_31_1:
    text: \n<TOPO MAYORDOMO>Hemos perdido nuestro trabajo en el castillo debido a los eventos recientes, así que ahora nos hemos reinventado como granjeros.

message_31_2:
    text: \n<TOPO GRANJERO>¡Aun así!\! Mis plantas no crecen.\! ¿Podrían necesitar más sol?

#TOPO MAYOR
#Wrong tag
message_32_1:
    text: \n<TOPO MAYOR>¿¡Estás viajando con \c[13]SWEETHEART\c[0]?!\. ¡Por favor, déjame hablar con ella!\. ¡Esto es un asunto de suma importancia!

#Wrong tag after speaking to SWH
message_32_2:
    text: \n<TOPO MAYOR>Es reconfortante ver que SWEETHEART ha regresado.

#SWH tag
message_32_3:
    text: \n<TOPO MAYOR>¡Dulce y bella duquesa!\. ¡Qué alegría verla! Estábamos en una gran necesidad de su llegada... hemos caído en tiempos oscuros.

message_32_4:
    text: \n<TOPO MAYOR>No muchos de nosotros nos hemos aventurado en el \c[11]CASTILLO\c[0] y pocos han regresado.\. Parece que ha caído en la ruina y la anarquía, y a su vez, nos hemos atrincherado aquí.

message_32_5:
    text: \n<TOPO MAYOR>Por favor, trae justicia y orden a nuestras tierras, ¡De alguna manera! \. Todo ha caído en la ruina y tú estás ligada a estos dominios.

#-----BROTOPO village NPC SWH tag reactions
message_swh_1:
    text: \n<PEÓN>C¿Podría ser...? \QUAKE[1]¡SÍ ES!\.\QUAKE[1] \SINH[1]SWEETHEART!!\!\SINH[1] Ejem... ¡Soy un gran, gran fan! ¿Podría pedirte un autógrafo?

message_swh_2:
    text: \n<PEÓN>\QUAKE[1]¿SWEETHEART?\.\QUAKE[1] ¿En una \QUAKE[2]Villa BROTOPO?\QUAKE[2]\. ¡Pues, solo podrías haber bajado aquí por un motivo especial!\. ¿Es por mí?\. Por favor, dime que es por mí

message_swh_3:
    text: \n<PEÓN>Ah!\. ¡Su majestad!\- \QUAKE[2]¡Debo honrarla con la presencia de mi COLECCIÓN DE PRODUCTOS DE SWEETHEART!\.\QUAKE[2] Es tan solo la tercera mejor del mundo...

message_swh_4:
    text: \n<PEÓN>Nunca te había visto en persona...\. SWEETHEART\. ... ¡Te ves mucho más majestuosa en persona que en tus pósters!

message_swh_5:
    text: \n<PEÓN>¡Mi señora!\. ¡Usted nos honra con su presencia!\. ¡Así que aquí, le ofrezco esto a cambio! 

message_swh_6:
    text: \n<PEÓN>¿Qué te trae por aquí, SWEETHEART?\. Oh, estoy seguro de que no podría ser por mi humilde presencia.\. ¡Toma, que esto lo compense!

#After receiving item
message_swh_7:
    text: El BROTOPO se ha quedado aturdido.

#Talking to butler mole as Sweetheart

message_swh_8:
    text: \n<TOPO GRANJERO>Oh, mi la-\!

message_swh_9:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 24
    text: \n<SWEETHEART>¡Qué absurdo!\. ¡Un sirviente de mi alegre castillo, reduciéndose a un trabajo de granja tan humilde!\. ¡Estás ensuciando mi nombre!

message_swh_10:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 16
    text: \n<SWEETHEART>¡Esto no quedará impune!

message_swh_11:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 26
    text: \n<SWEETHEART>\QUAKE[1]ESTO NO QUEDARÁ IMPUNE\QUAKE[1]!

# Trying to go to metro while SWH is missing
no_swh_1:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 38
    text: \n<SPACEBOY>Oye...\. Probablemente deberíamos buscar a SWEETHEART primero antes de irnos.

# CRUMBLING CASTLE NPCs--------------
#Big Molio - Big Molio is blocking the way to the dungeon

#First meeting
message_40_1:
    text: \n<BIG MOLIO>Yo soy BIG MOLIO.\! Estoy hambriento.\! Mi hambre solo anhela una cosa... Una \c[4]TORTA DE TOFU\c[0].\!¿Puedo pedirte una \c[4]TORTA DE TOFU\c[0]?

message_40_2:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 2
    text: \n<DOUGHIE>Oho...\! ¿Qué tipo de pastel se hace con tofu?\! Nunca he horneado con nada que no sea harina...

message_40_3:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 37
    text: \n<SPACEBOY>Bueno, ahora puedes ampliar tus horizontes.\! Vamos a encontrar un lugar para que DOUGHIE cocine.

#Talk again, no cake
message_40_4:
    text: \n<BIG MOLIO>...No tienes una \c[4]TORTA DE TOFU\c[0].\! Está bien..\! Mi hambre quiere el pastel, no a ti.\! Esperaré.

#Talk with cake
message_40_5:
    text: \n<BIG MOLIO>Una \c[4]TORTA DE TOFU\c[0]... Por favor, tengo hambre.\! ¿Puedo tenerlo?

#Give cake
message_40_6:
    text: \n<BIG MOLIO>Te estoy agradecido.

message_40_7:
    text: \n<BIG MOLIO>Recordaré tu generosidad, incluso mientras mi hambre anhele algo más.

#Dialogues for baking TORTA DE TOFU

message_41_1:
    text: Hay un pastel a medio hornear en el horno. ¿Vas a prender el horno?

message_41_2:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 1
    text: \n<DOUGHIE>Oho...\! Este pastel está fresco y listo.

# SB JAIL CELL MINI CUTSCENE --------------
message_sb_1:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 39
    text: \n<SPACEBOY>Espera...\. ¿Esto no es...?

message_sb_2:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 2
    text: \n<DOUGHIE>Hmm.\. Por alguna razón, esta celda parece más agradable que las otras.

message_sb_3:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 0
    text: \n<DOUGHIE>¿Hubo alguna razón en particular para esto, SWEETHEART?

message_sb_4:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 17
    text: \n<SWEETHEART>Ohohoho!\. Bueno, verás, ¡Aquí es donde se quedó SPACEBOY mientras vivía conmigo!

message_sb_5:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 16
    text: \n<SWEETHEART>Ahh, fue una época tan hermosa...\. cuando él hacía prácticamente todo lo que se le pedía...

message_sb_6:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 21
    text: \n<SWEETHEART>A diferencia de ahora, que regularmente discute y desobedece.

message_sb_7:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 45
    text: \n<SPACEBOY>¡La gente no vive en celdas normalmente, SWEETHEART!

message_sb_8:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 21
    text: \n<SWEETHEART>Hmph!\. Te di una tan bonita, y sin embargo, ¡tienes el DESCARO de ser desagradecido!

message_sb_9:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 4
    text: \n<DOUGHIE>Oho... oh, cielos....

message_sb_10:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 44
    text: \n<SPACEBOY>Mira, ya hemos tenido esta conversación como diez veces.

message_sb_11:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 38
    text: \n<SPACEBOY>Mejor...\. olvidémoslo.

message_sb_12:
    faceset: MainCharacters_ReverieDreamworld
    faceindex: 21
    text: \n<SWEETHEART>Por una vez, estoy de acuerdo.\. ¡Tenemos cosas mucho más importantes que hacer!
# QUESTS--------------
#------------Poster retrieval
#Receive quest
message_quest_1:
    text: \n<TOPO SAQUEADOR>Oye.\. perdí mis pósteres en alguna parte mientras estaba en un ataque de pánico.

message_quest_2:
    text: \n<TOPO SAQUEADOR>Son artículos de colección bastante importantes, y creo que podría volver a entrar en pánico si no los recupero.

message_quest_3:
    text: \n<TOPO SAQUEADOR>Si alguna vez encuentras alguno, por favor, tráemelo para que pueda dormir en paz.

#Talk while he doesn't have posters
message_quest_4:
    text: \n<TOPO SAQUEADOR>No veo ningún póster en ti.\. Al menos, ninguno que sea un artículo de colección.

message_quest_5:
    text: \n<TOPO SAQUEADOR>¡Por favor! \. ¡No les quiten el ojo de encima!\. ¡Ya siento que se me sube la presión!

#Give poster
message_quest_6:
    text: \n<TOPO SAQUEADOR>Ooooh!\. ¡Oh, lograste encontrar algunos!

message_quest_7:
    text: \n<TOPO SAQUEADOR>¡Oh, por favor, toma esto con todo mi agradecimiento!

#Quest done
message_quest_8:
    text: \n<TOPO SAQUEADOR>Finalmente, siento que los temblores empiezan a debilitarse...\. ¡Muchas gracias!

message_quest_9:
    text: \n<TOPO SAQUEADOR¡Por favor, ten esto!\. Ya no lo necesito, no cuando tengo que concentrarme en mi colección.

