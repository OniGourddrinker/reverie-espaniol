intro_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<FANTASMA DE SEÑAL DE ALTO>Con cuidado.\! Es \quake[1]peligroso\quake[0] adentro.\. ¿Qué estás buscando?

intro_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<FANTASMA DE SEÑAL DE ALTO>¿Qué tiene de peligroso?\! Bueno...\. el área que se encuentra detrás es...\. "inestable."

intro_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<FANTASMA DE SEÑAL DE ALTO>Mi trabajo es impedir que los desconocidos anden tonteando por ahí.\. Es realmente por protegerlos a ellos.

intro_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<FANTASMA DE SEÑAL DE ALTO>Lo digo en serio,\. de verdad.\. No es que me paguen ni nada.\. Lo hago por mi propia cuenta.\. Es totalmente sincero.

intro_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>En todo caso...\. Ah, sí...\. Todavía no me presenté...\! Mi nombre es HALTIA.\. Encantada de conocerte.\. No veo cosas que respiren muy a menudo, así que...\. ¿disculpa lo incómodo?

intro_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Pregúntame lo que quieras sobre este sitio\. A veces se pone solitario....\. Un poco de actividad vendría bien.

question_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Saludos.\. ¿De qué quieres hablar?

question_c1:
    text: VOS

question_c2:
    text: EL METRO

question_c3:
    text: EL ÁREA

question_c4:
    text: DEJAR ENTRAR

question_c5:
    text: TIENDA

# > YOU
you_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Oh, bueno,\. uh...\| ¿De qué debería hablar siquiera...?

you_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Soy una poltergeist.\. Me gustan los trenes.\. Creo.\. La vestimenta es algo descarada,pero juro que no elegí este atuendo yo misma...\. exactamente.

you_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Cómo llegué a existir como poltergeist, te preguntarás\! Well... Bueno... te seré sincera, ni yo lo sé.

you_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Quiero decir, si soy un fantasma, es probablemente seguro asumir que morí en algún momento...

you_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Eso me recuerda que,\. como fantasma, soy naturalmente incorpórea...\. Al menos hasta cierto punto.\! En mi caso, resulta que \c[4]absorbo todos los ataques de IRA \c[0].

you_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>No sé cómo funciona eso exactamente...\. Tal vez tuve un accidente por ira en la carretera en mi vida pasada.\! Quién sabe.\. No le andas preguntando a la gente por qué respira.

you_7:
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Lo que me recuerda...\.tengo otras dos hermanas, que casualmente también absorben sus respectivas EMOCIONES.\! El universo a veces se alinea.

you_8:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Aunque, dudo que vayas a verlas...\. Lo más probable es que estén en estaciones completamente diferentes.

# > THE METRO
metro_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Con respecto a este lugar...\. Bueno...\. En verdad no conozco el propósito exacto de esta zona.

metro_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Esa pregunta es mejor para...\.Ya sabes ese sujeto alto y misterioso,\. ¿El que sostiene una lámpara?\. Probablemente él sepa más que yo sobre eso.

metro_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Sin embargo,\. de lo que sí puedo hablar,\. es de los fenómenos que surgen aquí, en lo profundo de la tierra

metro_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Como habrás notado,\hay bastantes fantasmas...\. o apariciones...\. o muertos vivientes,\. como quieras llamarlos.

metro_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Las áreas más profundas parecen dar lugar a fenómenos más extraños,\. especialmente lugares como este que ha estado abandonado durante mucho tiempo.

metro_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Aunque recientemente... hubo un gran \sinv[1]estruendo\sinv[0].\.¿Y el área se levantó un poco?\!Eso creo\. Soy una poltergeist,\. no un medidor de profundidad.

metro_7:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Desde aquel incidente se abrieron nuevas grietas, conectando el metro con el mundo exterior.\. Tal vez eso podría explicar parte de los fenómenos..

# > THE AREA
area_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>¿El área detrás de mí?\! Sí, es bastante peligrosa.

area_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Algunos rincones de las áreas más profundas del metro son...\. extraños, como mínimo.\! Incluso para mis estándares fantasmales.

area_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Verás toda clase de criaturas que parecen aparecer de la nada\. Como un sueño roto, si quieres.

area_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Es decir, toda clase de enemigos de un montón de lugares, que van desde \c[4]FALLEN WORLD\c[0] hasta el \c[4]CASTILLO\c[0]. Puede que incluso de otras zonas que todavía no conozco.

area_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Pero no son exactamente lo mismo. Es como,\. una aparición vaga, una especie de copia o imagen residual para que te hagas una idea. Aunque sin duda todavía pueden hacerte daño...

area_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Incluso he visto copias mías de vez en cuando.\! Lo juro,\. si ves alguna,\. esa no soy yo..\. La verdadera yo está aquí.\. Ahora mismo.

area_7:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>No obstante, no suelen hablar, así que debería ser fácil distinguirlos\. Eso espero.

area_8:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Las apariciones acechan en la noche, como dicen\. n. Así que no vayas allí a menos que quieras que te golpeen hasta que tu alma esté roja como una cereza molida.

# > CAN YOU LET IN?
battle_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>¿De verdad, de verdad, DE VERDAD necesitas entrar ahí?

# Ok i swear i will change this one. chat they didn't change it :( y no me gusto como quedo el acuerdo 
battle_2: 
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Vamos\. ¿Siquiera sabes lo que pasa ahí?\! Porque no creo que lo sepas.

battle_3: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Mira, si de verdad necesitas entrar ahí...\. Supongo que puedo hacer unos acuerdos.

battle_4: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>¿Qué tal esto...?\! Demuestra tu fuerza\. Tú y yo,\. peleamos.\! Si eres lo suficientemente fuertem, no me preocupare tante.\. ¿Qué te parece?

battle_c1:
    text: BIEN

battle_c2:
    text: MAL

# > AWFUL
battle_5: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Si...\. Eso me imaginaba....

# > GREAT
battle_6: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Oh, vale.\! No me esperaba eso.\! Mmm...\. Pues muy bien,\. supongo...\! ¡Ven a por mí!

# POST BATTLE
battle_7: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>¡Muy bien!\. ¡Ya es suficiente!\! Parece que sabes lo que estás haciendo.

battle_8: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Ahora quitaré esta barricada.\! Solo pórtate bien ahí dentro.

# Ellipsis Bubble arreglar battle 10 no me gusta como queda

battle_9: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Oh, es verdad, casi lo olvidaba.\! Ya que vas a estar ahí dentro, ¿Podrías hacerme un favor?

battle_10: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Tengo algunas...\. ¿cómo lo describo?...\. \c[4]COSAS\c[0]\! Unas cosas mágicas de fantasmas ,\. difícil de explicar\. 

battle_11: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>\c[4]Debería haber 3 de ellas\c[0], si no recuerdo mal.\! Las necesito para montar algunas...\. cosas.\! Además, podrían servirte, quién sabe.

battle_12: 
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>En fin, yo me quedaré por aquí afuera.\! No dudes en hablarme cuando quieras.

# > QUEST (Auto Start when fulfilled)

quest_1: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Oh wow,\. conseguste mis,\. uh,\. cosas.

quest_2: 
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>Si no te importa,\. lo tomaré.

quest_3: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>Ya con eso resuelto...\! ¡Ahora puedo crearte cosas!

quest_4: 
    faceset: SideCharacters_ReverieFW
    faceindex: 11
    text: \n<HALTIA>¿Cómo?\! ¿No es algo que pensarías que haría?\! Es simple magia de fantasma.

quest_5: 
    faceset: SideCharacters_ReverieFW
    faceindex: 10
    text: \n<HALTIA>En fin,\. si te llaman la atención mis pequeñas baratijas podes venir a hablar conmigo por eso.