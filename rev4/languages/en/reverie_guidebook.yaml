
# =========================================================================================
# Bestiary pleas lord help me con esto
# =========================================================================================
EmptyEnemyName: '¡LIBRO DE INFORMACIÓN!'
Information:
  # =========================================================================================
  # INFO
  # =========================================================================================
  1:
    name: |
      \c[4]STATS:\c[0] LUCK
    background: {name: 'rv_info_statluck', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 1
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          \c[4]SUERTE\c[0] Afecta tanto a la probabilidad
          de infligir como de recibir 
          golpes \c[4]CRITICOS\c[0] y \c[4]ALTERACIONES\c[0].

          En detalle, las probabilidades se basan 
          en la diferencia de suerte entre el usuario
          y el objetivo.
          
          Cada punto de diferencia 
          aumenta la probabilidad de infligir
          y disminuye la probabilidad de recibir 
          recibir golpes \c[4]CRITCOS\c[0]
          o \c[4]ALTERACIONES\c[0] por \c[4]2%\c[0].
          
          La mayoría de las habilidades, incluidos los 
          los ataques básicos, tienen una \c[4]probabilidad base del 5%.\c[0].
  2:
    name: |
      \c[4]STATS:\c[0] EVASION
    background: {name: 'rv_info_stateva', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 1
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          La estadística \c[4]EVASIÓN\c[0] es un nuevo parámetro  
          que reduce las probabilidades de ser golpeado
          por un ataque.
          
          La precisión es ahora la diferencia
          entre la \c[4]PRECISIÓN\c[0] del atacante,
          y la \c[4]EVASIÓN\c[0] del defensor.
  3:
    name: |
      \c[4]BUFFS:\c[0] OVERVIEW
    background: {name: 'rv_info_buffgen', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 2
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          Tanto las MEJORAS como las DESMEJORAS
          están ahora en el mismo espectro. 
          reduce debuff NIVELs, Aplicar una mejora
          reducirá los niveles de desmejora y viceversa.
          
          Además, sus efectos ya no expiran por sí solos.
  4:
    name: |
      \c[4]BUFFS:\c[0] ATTACK & DEFENSE
    background: {name: 'rv_info_buffatk', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 3
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          Tanto las mejoras de ATAQUE como las de DEFENSA 
          son ahora multiplicativas en los valores de daño, 
          en lugar de modificar las estadísticas base de ATAQUE
          o DEFENSA.

          Cada nivel de MEJORA DE ATAQUE aumenta
          el daño infligido en un \c[4]x1.15\c[0]; 
          y cada DESMEJORA en un \c[4]x0.85\c[0].

          Cada nivel de MEJORA DE DEFENSA reduce 
          el daño recibido en un \c[4]x0.85\c[0]; 
          y cada DESMEJORA incrementa en un \c[4]x1.15\c[0].
  5:
    name: |
      \c[4]BUFFS:\c[0] SPEED
    background: {name: 'rv_info_buffspd', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 4
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          Las mejoras de VELOCIDAD son ahora más débiles
          que en el OMORI base, especialmente el último nivel.
          Las DESMEJORAS se mantienen igual.

          Los valores son los siguientes:
          
          \c[4]NIVEL 3:\c[0] x300% (Antes x500%)
          \c[4]NIVEL 2:\c[0] x200%
          \c[4]NIVEL 1:\c[0] x150%

          \c[4]NIVEL -1:\c[0] x80%
          \c[4]NIVEL -2:\c[0] x50%      
          \c[4]NIVEL -3:\c[0] x25%
  6: 
    name: |
      \c[4]BUFFS:\c[0] HIT & EVASION
    background: {name: 'rv_info_buffhit', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 5
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          PRECISIÓN y EVASIÓN 
          (PRE/EVA en corto) 
          cambia tanto las estadísticas
          de PRECISIÓN y EVASIÓN. 
          
          
          Los valores son los siguientes:
          
          \c[4]NIVEL 3:\c[0] +45%
          \c[4]NIVEL 2:\c[0] +30%
          \c[4]NIVEL 1:\c[0] +15%

          \c[4]NIVEL -1:\c[0] -15%
          \c[4]NIVEL -2:\c[0] -30%      
          \c[4]NIVEL -3:\c[0] -45%
  7: 
    name: |
      \c[4]AILMENTS:\c[0] OVERVIEW
    background: {name: 'rv_info_ail1', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 6
    forceTransformId: 1200
    ignoreEnemyCondition: true
    switchCondition: 2722
    pages:
      1:
        text: |
          Las ALTERACIONES son efectos
          de estado negativos,
          algunos de los cuales
          se basan en las emociones. 
          

          Al igual que con los golpes CRITICOS
          La probabilidad de causar ALTERACIONES
          depende de tu \c[4]SUERTE\c[0] cuanta más tengas 
          respecto al enemigo, más fácil será acertar.
          
          Solo se puede aplicar uno a la vez, 
          teniendo prioridad las ALTERACIONES
          no emocionales.

          \c[11]Puedes ver más información sobre las debilidades de los enemigos
          \c[11]manteniendo pulsadas las teclas ARRIBA o ABAJO
          \c[11]mientras selecionas sobre ellos.
  8: 
    name: |
      \c[4]AILMENTS:\c[0] EMOTION
    background: {name: 'rv_info_ail2', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 7
    forceTransformId: 1200
    ignoreEnemyCondition: true
    switchCondition: 2722
    pages:
      1:
        text: |
          Las ALTERACIONES emocionales requieren 
          que el objetivo tenga una emoción específica
          antes de poder aplicarse.

          Mientras esté bajo su influencia, 
          \c[4]el objetivo no podrá cambiar de emoción.\c[0]
          Sus efectos anulan los beneficios de dicha
          emoción y agravan sus desventajas.

          Las ALTERACIONES Emocionales consisten en 
          \c[4]QUEMADURA, BRILLO, LLANTO y CONGELADO.\c[0]
          Tienen una duración de 2 a 3 turnos.

          Las ALTERACIONES no Emocionales consisten en
          \c[4]DORMIDO, FASCINAR y ENFERMO.\c[0]
          Tienen una duración de 1 a 2 turnos.
  9: 
    name: |
      \c[4]AILMENTS:\c[0] EFFECTS (1)
    background: {name: 'rv_info_ail3', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 8
    forceTransformId: 1200
    ignoreEnemyCondition: true
    switchCondition: 2722
    pages:
      1:
        text: |
          \c[4]QUEMADURA [ENOJADO]:\c[0]
          * Pone DEFENSA a 1
          * x75% ATAQUE
          * -10% CORAZÓN por turno
          * Impide el uso de habilidades que no inflijan daño

          \c[4]LLANTO [TRISTE]:\c[0]
          * Pone VELOCIDAD a 1
          * x75% DEFENSA
          * -10% JUGO por turno
          * Impide el uso de habilidades de daño
          * x200% COSTO DE HABILIDAD

          \c[4]BRILLAR [FELIZ]:\c[0]
          * -100 SUERTE
          * -50 PRECISIÓN
          * -100 EVASIÓN
          (Debido a que FELIZ sube la suerte un mayor nivel
          de FELIZ también incrementa la tasa de BRILLO)
  10: 
    name: |
      \c[4]AILMENTS:\c[0] EFFECTS (2)
    background: {name: 'rv_info_ail4', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 8
    forceTransformId: 1200
    ignoreEnemyCondition: true
    switchCondition: 2722
    pages:
      1:
        text: |
          \c[4]CONGELADO [NEUTRO]:\c[0]
          * Salta el turno
          * No puede ser curado
          * Garantizado de ser golpeado

          \c[4]DORMIDO:\c[0]
          * Salta el turno
          * Garantizado de ser golpeado
          * Garantizado de recibir CRITICOS

          \c[4]CHARM:\c[0]
          * La selección de objetivos se invierte
            (Excepto habilidades propias y objetos)

          \c[4]ENFERMO:\c[0]
          * x60% ATQ, DEF, VEL
          * -40% PRE, EVA
          * -7% CORAZÓN y JUGO por turno
  11:
    name: |
      \c[4]MISC:\c[0] CHANGES
    background: {name: 'rv_info_other1', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: 0
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          Ahora se pueden equipar hasta 6 habilidades 
          a diferencia de las 4 del juego original.

          La conversion de JUGO mientras TRISTE se redujo:
          \c[4]TRISTE:\c[0] 30% => 20%
          \c[4]DEPRESIVO:\c[0] 50% => 40%      
          \c[4]MISERABLE:\c[0] 100% => 60%

          Ahora los enemigos también consumen
          JUGO al usar sus habilidades, 
          lo que significa que ellos también
          también pueden quedarse sin JUGO

          Los miembros del equipo que estén
          TOSTADA ahora reciben la mitad de la
          experiencia, en lugar de no recibir nada.
          
  12:
    name: |
      \c[4]EMOTIONS:\c[0] RECAP
    background: {name: 'rv_info_emo1', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: -2
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          Consulta la tabla para ver un resumen general.

          Recordatorio importante las EMOCIONES
          también afectan a la probabilidad de obtener
          objetos, como se muestra a continuación:

          \c[4]ENOJADO:\c[0] +EXP
          \c[4]FELIZ:\c[0] +ALMEJAS, +OBJETOS
          \c[4]TRISTE:\c[0] -EXP, -ALMEJAS

          Sin embargo, es posible que ciertos
          enemigos estén exentos de estos cambios.
          
  13:
    name: |
      \c[4]MISC:\c[0] DIFFICULTY
    background: {name: 'rv_info_other1', x: 0, y: 0}
    position: {x: 160, y: 425}
    character: {name: 'FA_OMORI', index: 0}
    listIndex: -1
    forceTransformId: 1200
    ignoreEnemyCondition: true
    pages:
      1:
        text: |
          \c[4]NORMAL\c[0] aumenta el daño infligido,
          reduce el daño recibido y la probabilidad 
          de sufrir estados alterados. 

          Esta opción se asemeja más a la experiencia
          del juego original en cuanto a dificultad.
          

          \c[4]FACIL\c[0] aumenta aún más
          los beneficios que ofrece el modo NORMAL

          \c[4]DIFICIL\c[0] otorga habilidades y comportamientos
          unicos a algunos enemigos,además de aumentar
          ocasionalmente el tamaño del grupo enemigo.
          

          Esta es la experiencia completa, ya que se
          muestran todas las mecánicas de los enemigos.