# ================================================================
# DADDY LONGLEGS
#
# He will appear quite a few time, hence own file.
# ================================================================

# ================ Metro B2 ================
# In the deeper metro he will also be found. This time he will narrate (can be subtle) about how this deeper area is closer to the subconscious. Partly explains why the enemies are from all over the place and how they aren't really the same as the ones from original areas (kind of like duplicates).

metro_1:
    text: \n<DADDY LONGLEGS>He aquí, SOÑADOR.

metro_2:
    text: \n<DADDY LONGLEGS>Debes saber ya que nada en este mundo surgió de la nada\. Sus lugares,\. sus criaturas...\. todos provienen de un lugar más profundo.

metro_3:
    text: \n<DADDY LONGLEGS>Estoy seguro de que has notado que los habitantes de aquí parecen...\ fuera de lugar.\! Aún así, por supuesto,\. son distintos de los demás.\. ¿Qué ha cambiado, SOÑADOR?\! ¿Fuiste tú?

metro_4:
    text: \n<DADDY LONGLEGS>Siempre has tenido problemas para afrontar tu propio subconsciente.\! ¿Por qué razón llegó a ser tu recipiente?

metro_5:
    text: \n<DADDY LONGLEGS>Pero claro,\. ¿parece que has aprendido esa lección?\! Quizás tengas más éxito por tu cuenta en esta ocasión.

# ================ Pyrefly ================
# Daddy long legs will be in pyrefly, right before the "media locked" area section of Pyrefly (essentially early starting area).
# He will talk to SUNNY directly, and narrate information (can be subtle) related to how this previously Black Forest turned into a less serious Dream world type area.
pyre_1:
    text: \n<DADDY LONGLEGS>Ya no te quedan secretos que enterrar....\. en su ausencia,\. este sitio que alguna vez fue sombrío se ve un poco más brillante.

pyre_2:
    text: \n<DADDY LONGLEGS>¿Es por eso que has venido,\. SOÑADOR?\! Supongo que no hay nada de malo en tomarse un descanso en este mundo,\. de vez en cuando, ¿no?

pyre_3:
    text: \n<DADDY LONGLEGS>Pero,\. por favor dime.\. ¿Qué estás buscando esta vez?\! ¿Acaso algo que no puedes hallar en el mundo consciente?

pyre_4:
    text: \n<DADDY LONGLEGS>Sé cauteloso\! Estás viendo de primera mano cómo cambia este mundo...\. asegúrate de poder encontrar el camino a casa sin tu recipiente.
