 # ===========================================
 # Menu scenes and translations
 # ===========================================

plugins:
  mainMenu:
    commands:
      - ['???', 'CAMBIAR', 'APUÑALAR']
      - EQUIPO
      - OBJETO 
      - HABILIDADES
      - OPCIONES
    status:
      tag: ¿CAMBIAR A?
      select: ¿SELECIONAR A?

  equipMenu:
    weapon: ARMA
    charm: AMULETO
    replace: ¿REEMPLAZAR CON?

  skillMenu:
    skills: HABILIDADES
    replace: ¿REEMPLAZAR CON?
    DoWhat: ¿HACER QUÉ?
    use: USAR
    swap: CAMBIAR
    useon: ¿USAR EN QUIEN?

  pocketMenu:
    consumables: CONSUMIBLES
    toys: JUGUETES
    important: IMPORTANTE
    trash: BASURA
    use: USAR
    sure: ¿ESTAS SEGURO?
    useon: ¿USAR EN QUIEN?

  optionsMenu:
    general:
      screenResolution:
        text: RESOLUCIÓN DE PANTALLA
        options: ['X1', 'X2', X3, X4]
        help: Cambia la resolución de la pantalla.
        spacing: 80

      fullScreen:
        text: PANTALLA COMPLETA
        options: ['ON', 'OFF']
        help: Pon el juego en pantalla completa.
        boolIndex: true
        spacing: 80

      commandRemember:
        text: RECUERDA LOS COMANDOS SELECCIONADOS
        options: ['ON', 'OFF']
        help: Recuerda los comandos seleccionados en batalla.
        boolIndex: true
        spacing: 80

      battleAnimations:
        text: ANIMACIONES DE BATALLA
        options: ['ON', 'OFF']
        help: HELP TEXT
        boolIndex: true
        spacing: 80

      battleAnimationSpeed:
        text: VELOCIDAD DE LA ANIMACIÓN DE LA BATALLA
        options: ['NORMAL', 'RAPIDO', 'RAPIDOX2', 'RAPIDOX3']
        help: HELP TEXT
        spacing: 130

      battleLogSpeed:
        text: VELOCIDAD DE BATTLELOG
        options: ['NORMAL', 'AUTO']
        help: HELP TEXT
        spacing: 130

      alwaysDash:
        text: MOVIMIENTO DE PERSONAJE
        options: ['CORRER', 'CAMINAR']
        help: HELP TEXT
        boolIndex: true
        spacing: 130

    audio:
      bgmVolume:
        text: VOLUMEN BGM 
        help: Ajusta el volumen de la música de fondo.

      bgsVolume:
        text: VOLUMEN BGS
        help: Ajusta el volumen de sonido de fondo

      meVolume:
        text: VOLUMEN ME
        help: Ajusta el volumen de efectos de sonido.

      seVolume:
        text: VOLUMEN SE
        help: Ajusta el volumen de efectos de sonido.

    controls:
      keyboardHeader: TECLADO
      gamepadHeader: MANDO
      pressKeyPrompt: PRESIONA UNA TECLA
      resetAll: REINICIAR TODO
      help: Presione una tecla para reasignar.
      inputNames:
        up: ARRIBA (↑)
        down: ABAJO (↓)
        left: IZQUIERDA (←)
        right: DERECHA (→)
        ok: CONFIRMAR
        escape: CANCELAR
        shift: CORRER
        tag: CAMBIAR
        tab: STRAFE
        pageup: LB
        pagedown: RB

    system:
      load:
        text: CARGAR ARCHIVO GUARDADO
        help: Cargar un archivo guardado
