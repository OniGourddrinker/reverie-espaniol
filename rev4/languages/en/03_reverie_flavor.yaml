#========================================================================================
# THE RIDE HOME
#========================================================================================

book1_1:
      text: \"Uno por uno, se quedaron dormidos en el viaje a casa.\! <br>Después de todo, fue un largo día de playa<br>y todos estaban agotados.\"

book1_2:
      text: \"KEL fue el primero en dormirse, y luego el resto.\"

book1_3:
      text: \"Mientras el sol se ponía sobre la autopista, la cabeza de \n[17] <br>cae accidentalmente sobre el hombro de AUBREY.<br><br>La sacudida repentina lo despierta,<br>pero no se atreve a abrir los ojos.\"

book1_4:
      text: \"Finge estar dormido y estabiliza su respiración.\! <br>Y escucha el sonido de la carretera.\"

book1_5:
      text: \"Siente el suave sol que reposa sobre su piel y el ligero escozor en la nariz que anticipa la quemadura de sol que tendrá mañana\"

book1_6:
      text: \"Está feliz...\! muy, muy feliz...\! <br>Y se promete a sí mismo, que pase lo que pase,<br>recordará este momento para siempre.\"
      
#========================================================================================
# Tracks:
#========================================================================================

book2_1:
      text: \"Un charco de jugo se absorbe en la alfombra.\"

book2_2:
      text: \"Justo encima de él está nada menos que KEL,sosteniendo <br>una caja de jugo abierta.\"

book2_3:
      text: \"Él mira a sus amigos,que muestran el mismo rostro de decepción\! Él suelta una risa culpable.\"

book2_4:
      text: \"En lo que parece menos de un segundo, <br>KEL desaparece por la puerta principal.\"

book2_5:
      text: \"Una pequeña gatita negra atraviesa la mancha,dejando rastros mojados y pegajosos por toda la alfombra\"

book2_6:
      text: \"HEROse pone rojo y le grita a KEL, <br>pero KEL ya había desaparecido.\"

book2_7:
      text: \"MARI le da a HERO algunas toallas de papel húmedas\"

book2_8:
      text: \"Se diría que son los únicos mayores aquí...\! y si no limpian esto rápido la alfombra se va quedar manchada\! Tendrán que lidiar con KEL más tarde...\"
      
#========================================================================================
# Hottest Day of Summer:
#========================================================================================

book3_1:
      text: \"Era un día caluroso de verano, y lo único en lo que \n[17] podía pensar era por qué no podían hacer esto mañana.\"

book3_2:
      text: \"El patio trasero estaba hecho un desastre.\"

book3_3:
      text: \"Tablones de madera estaban esparcidos por la zona.\! <br>Manchas de pintura salpicaban el pasto gracias al trabajo de BASIL y AUBREY.\"

book3_4:
      text: \"Durante todo el día, \n[17] vio a HERO cargar tablones de madera de un lado a otro de la camioneta de su papá.\"

book3_5:
      text: \"Observó a KEL martillarse los dedos una y otra vez, y se dio cuenta de que había pasado más de una hora desde que MARI había bajado de su escalera.\"

book3_6:
      text: \"'Simplemente les daré apoyo moral',pensó \n[17] mientras se sentaba soñoliento bajo la sombra de su árbol favorito.\"

book3_7:
      text: \"Por supuesto, él sabía que ese no sería el caso.\"

book3_8:
      text: \"Pronto sus amigos le pedirán ayuda, y él no podrá negarse.\"

book3_9:
      text: \"La casa del árbol es para todos, por lo que es justo que todos pongan algo de trabajo.\"

book3_10:
      text: \"\n[17]es consciente de ello y acepta...\! pero de mala gana.\!<br>Se levanta lentamente y se dirige tambaleándose hacia el desorden.\"

book3_11:
      text: \"Él sabe que debe hacer su parte.\!<br>Pero justo tuvo que ser el día más cálido del verano.\"
      
#========================================================================================
# School Day:
#========================================================================================

book4_1:
      text: \"Este año, \n[17] tuvo la suerte de que le asignaran un escritorio al lado de la pequeña ventana.\"

book4_2:
      text: \"Todos los días durante en clase, \n[17] se quedaba mirando sin interés por la abertura...\! bservando las sombras de los árboles, las nubes que se movían lentamente por el cielo.\"

book4_3:
      text: \"Su mente divagaba a otra parte...\! hacia sus propios mundos, sus propias historias, sus propias aventuras.\"

book4_4:
       text: \"Tenía el hábito de hacer esto.\!<br>Era fácil para él distraerse.\"

book4_5:
      text: \"Hoy fue igual que cualquier otro.\! \n[17] miraba al vacío por la pequeña ventana mientras las nubes pasaban una por una.\"

book4_6:
      text: \"De pronto, una mano le da una palmada juguetona en la espalda,despertándolo de su fantasía.\! \n[17] deja de mirar por la abertura.\"

book4_7:
      text: \"KEL sonrie.\! Señala que la clase ha terminado y que por fin es la hora del almuerzo.\! Hoy toca pizza, y <br>necesitan salir corriendo a la cafetería antes de que no quede nada.\"

book4_8:
      text: \"El estómago de \n[17] ruge.\! Y mira la pequeña ventana por última vez.\"

book4_9:
      text: \"Tendrá que continuar su aventura otro día.\"
      
#========================================================================================
# Statue at the Lake:
#========================================================================================

book5_1:
      text: \"Es el atardecer.\! Una extraña estatua vigila el lago escondido.\! Puede que haya tenido un significado relevante en el pasado, pero el tiempo ha hecho que su inscripción sea ilegible.\"

book5_2:
      text: \De cualquier manera,no tiene importancia para el grupo que lo <br> visita hoy.\! Solo están aquí para usarlo como plataforma de clavados.\"

book5_3:
      text: \"Los hermanos se turnan para saltar de la estatua.\"

book5_4:
      text: \"HERO salta primero.\! Luego, KEL.\! <br>luego HERO de nuevo.\! luego KEL otra vez.\"

book5_5:
      text: \"Los hermanos animan con entusiasmo a \n[17] a que se les una, y después de pensarlo detenidamente \n[17] acepta con cautela.\"

book5_6:
      text: \"\n[17] sube lentamente por la estatua y mira hacia al agua en movimiento.\! Puede escuchar los latidos de su corazón.\! Sus oídos empiezan a zumbarle.\"

book5_7:
      text: \"Siente que sus piernas cederán en cualquier instante.\! Intenta concentrarse en su respiración...\"

book5_8:
      text: \"Siente algo arrastrándose en su hombro y sus ojos se abren de golpe para encontrarse con una araña negra.\"

book5_9:
      text: \"En un instante, \n[17] pierde el control y se lanza al lago.\! El agua le entra por la nariz.\! Mueve con fuerza sus miembros, pero el agua es superior.\"

book5_10:
      text: \"Es demasiado débil, demasiado indefenso...\! o eso es lo que él cree.\"

book5_11:
      text: \"\n[17] cierra los ojos...\! <br>y espera a que los hermanos lo salven.\"
      
#========================================================================================
# Saturday Morning Cartoons:
#========================================================================================

book6_1:
      text: \"Todos están aquí de nuevo hoy.\!<br>La ocasión especial es la mañana del sábado.\"

book6_2:
      text: \"Desde las 7:00 de la mañana hasta las 11:00, un grupo de seis amigos come un rico desayuno hecho en casa y ven la tele juntos.\"

book6_3:
      text: \"Es la parte más agradable de cada semana.\"

book6_4:
      text: \"\n[17] mira el reloj.\! 8:00AM.\! Quedan dos horas.\"

book6_5:
      text: \"Sería capaz de mirar con todos los demás hasta las 10:00 de la mañana, que es cuando llega su profesor particular.\"

book6_6:
      text: \"\n[17] pone mala cara.\! Lo que pensó que sería un pasatiempo gratificante no ha sido más que una molestia.\"

book6_7:
      text: \"En lugar de ver los programas con el resto de sus amigos, él será el único que se lo pierda.\"

book6_8:
      text: \"Si tan solo pudiera ver la última hora con todos los demás.\"

book6_9:
      text: \"Si tan solo no tuviera que tocar el violín...\"

