# ================================================================
# FLARICA / UBER FIERY
#
# Flarica themself are not major presence, but will plan to appear here and there in extra area.
# They literally backseat you with game mechanic. Average SMT fan.
# ================================================================

# They speak in pseudo-Old English, but more of a pretend kind.\
# They're not that old. Don't overdo the ridiculousness of it though, it's just more for juxtaposition reasons.
# It's more the type of wanting to appear old more than a weird speaking quirk, 
# They can still occasionally break character just to be sassy.

# INTRO

intro_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FIERY>Whoa,\. ¿Hay alguien aquí?\! ¿En las profundidades de este bosque?
    
intro_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FIERY>Uh...\! \Com[2]\quake[1]AHEM!\quake[0].\! Habrás de llamarme FLARICA.

intro_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA¿Qué andas buscando en el corazón del bosque?\! ¿Quizás un desafío?

intro_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 30
    text: \n<FLARICA>Por supuesto,\. La zona por aquí es salvaje y mortal,\. pero no es nada extraordinario.\! Personalmente.,\.yo he visto cosas mejores

intro_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Luchar no se trata solo de poder,\. sino también de sabiduría.\! Puede que mi tamaño sea pequeño,\. pero tengo \sinv[1]experiencia\sinv[0].

intro_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>En fin, si hay algo que quieras saber, pregunta sin problemas.\. De todas formas, estoy aburrida.

# ======== QUESTION CHOICES ========
question_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>¿Hay algo que quieras saber?\. Pregunta,\. de todas formas estoy aburrida.

question_c1:
    text: VOS

question_c2:
    text: CONSEJO

question_c3:
    text: LUCHAR

question_c0:
    text: NO IMPORTA

question_no:
    faceset: SideCharacters_ReverieFW
    faceindex: 30
    text: \n<FLARICA>Maldición.

# > YOU

you_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>No soy como las otras hadas.\! Yo hablo,\. para empezar.\! Mis amigos creen que el lenguaje frena su libertad para hacer ruidos aleatorios a la gente.

you_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 26
    text: \n<FLARICA>Realmente no hago mucho.\! Escucho que a todas las hadas \sinv[1]geniales\sinv[0] les toca ser guías en pruebas mortales de fuerza...\! pero nunca tuve la oportunidad.

you_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 30
    text: \n<FLARICA>Ya no hacen pruebas como las de antes.\! Es un poco triste,\. la verdad.

# > ADVICE

advice_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>¿Un consejo?\! Pues te diré una cosa.

advice_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>Todo oponente tiene ciertos hábitos.\. Es inevitable, en verdad.\! Observa sus comportamientos,\. explótalo cuidadosamente,\. y la victoria es tuya.

advice_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Por ejemplo,\. a las hadas nos encanta nuestra evasión.\! Alejarnos de una mala situación, cuando nos apetece.\! Hacemos un pequeño fandango; cuanto más molesto,\. más gracioso.

advice_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 26
    text: \n<FLARICA>Por supuesto,\. algunas cosas quedan a la suerte,\.pero debes aprender a asegurar tus posibilidades.

advice_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>Algo de FASCISMO, y sentirse FELIZ, te da más suerte.\! sa es información genuina; no tengo nada que vender,\. nada que estafar.

advice_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 25
    text: \n<FLARICA>lgunas cosas te golpean directo en el corazón,\. pero se pueden prevenir la mayoría de las veces.\! Tu problema,\. tu asunto.\! Tan simple como eso.

advice_7:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>é perfectamente que lo que dije puede ser usado en mi contra.\! Sabiendo eso,\. no me importa; si alguien pelea conmigo,\. preferiría que piense un poco.

# > BATTLE

battle_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>Oho.\! ¿En serio?\! ¿Como, de verdad, de verdad?\! 

battle_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>No es que dude de vos,\. solo estoy sorprendida.\! Emocionada, de hecho,\. hace quién sabe cuánto que no levanto una espada.\! Estoy más oxidada que el acero dejado a la intemperie bajo los vientos del océano.

battle_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Considera esto como un tipo de prueba\! Yo seré tu formidable adversario,\. y tú estarás demostrando tu valía.

battle_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>¡Pues adelante!\! ¡Demuestra tu valía!\! Siempre quise decir eso.

# IN-BATTLE TEXT

# TURN 1
#fijarse en inbattle_1 si esta bienpuesto
inbattle_1:
    text: >
        \>FLARICA: \<Te doy un consejo,\. el \c[4]ORDEN DE TURNO\c[0] también es importante.\! 

inbattle_2:
    text: >
        \>FLARICA: \<Tal vez pienses:\. Los problemas de salud y las desventajas simplemente se eliminan,,\. ¿Cuál es la gracia?

inbattle_3:
    text: >
        \>FLARICA: \Pues,\. amigo mío,\. conseguiste que desperdiciaran un turno.\! Eso es bastante crucial.

inbattle_4:
    text: >
        \>FLARICA: \<Eso es,\. si puedes igualar mi velocidad.

# 30% HP

inbattle_5:
    text: >
        \>FLARICA: \<¡Impresionante!\. Parece que sabes lo que estás haciendo.\! Parece que es hora de que yo aumente la intensidad.

inbattle_6:
    text: >
        \>FLARICA: \<Tienes 4 integrantes en tu equipo.\! Es justo que yo también tenga 4 turnos, ¿No?

# 0% HP

inbattle_7:
    text: >
        \>FLARICA: \<Argh,\. Me diste.\! Me rindo.

# 0% HP at 30% HP condition

inbattle_8:
    text: >
        \>FLARICA: \<Saltándote fases, ¿eh?\! Eres muy inteligente.\! Me has atrapado.

# >POST-BATTLE 

battle_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>Ciertamente,\. sabes lo que haces.

battle_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Es justo que te dé algo pequeño como muestra de tu victoria.

# You got blaze igniter

battle_7:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Esto debería permitirte infligir QUEMADURA en un gran área.\! Es un poco costoso de usar,\. pero estoy seguro de que puedes entender cómo usarlo.

battle_8:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>En fin,\. en noticias no relacionadas,\. es probable que aparezca por aquí y por allá en otros sitios.

battle_9:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>Si por casualidad me ves, siéntete libre de saludar.\! Solo no empieces a preguntarme sobre cada pequeña cosa que encuentres.\! Piensa por tu cuenta también.


# ================================================================
# ADVICE in other areas. Kind of like more technical BISCUIT.
# ================================================================
adv_ask_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>Así que nos encontramos de nuevo.\. ¿Quieres algún consejo para esta zona?

# YES / NO

# ======== METRO B2 HALTIA ========
adv_haltia_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>¿Así que quieres ir a ese misterioso corredor oscuro?\! O sea, podría haber cosas buenas allí, quién sabe. No te culpo.

adv_haltia_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>¿Y el fantasma te está fastidiando por ello?\! implemente parecen estar preocupados por ti, no me preocuparía demasiado por eso.

adv_haltia_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>En cualquier caso. Probablemente ya te hablaron de su truco de absorción, ¿Verdad?\! Pues te diré algo más sobre ellas.

adv_haltia_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>A pesar de preocuparse por tu seguridad,\. carecen de la habilidad para cuidarse a sí mismos.\! En otras palabras,\. \c[4]no se quitan los efectos negativos\c[0].

adv_haltia_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>Todos los fantasmas parecen tener una gran velocidad por alguna razón, así que ralentizarlos podría ser una buena idea.

adv_haltia_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>¿En cuanto a su gran ataque?\! Pues, es una habilidad ofensiva.\! Recuerda que \c[4]ciertas AFECCIONES impiden usar ciertas habilidades.\c[0].\! Conecta los puntos por tu cuenta.

adv_haltia_7:
    faceset: SideCharacters_ReverieFW
    faceindex: 25
    text: \n<FLARICA>Te he dado varias opciones,\. ahora resuélvelo por tu cuenta.

# After
adv_haltia_a1:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>¡Oh! ¿Las venciste?\! Eso fue más rápido de lo que esperaba.

adv_haltia_a2:
    faceset: SideCharacters_ReverieFW
    faceindex: 30
    text: \n<FLARICA>Espero que no solo estuvieras luchando con ellos hasta que se les terminara el JUGO...\. Quiero decir, \sinv[1]es\sinv[0] una opción...\. Solo que no tiene gracia.

# ======== DUNGEON ALICE ========
adv_alice_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>¿No adoras a los osos?\! Son como perros grandes y lindos que comen bayas y salmón.

adv_alice_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>¿Pero uno ENOJADO?\! Ahí ya no es divertido.\! Muy desagradable,\. no bueno.\! Así que tienes que evitar eso.

adv_alice_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Y ahí es donde entra la chica.\! Ella comanda a los osos...\. Si ella consigue hacer que los osos se ENFUREZCAN primero, te destrozarán.

adv_alice_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>En otras palabras,\. el orden importa.\! \c[4]A veces, cambiar la velocidad de un solo enemigo puede ser preferible\c[0].\! Las EMOCIONES también pueden funcionar,\. \c[4]recuerda que tanto TRISTE como FELIZ alteran la velocidad.\c[0].

adv_alice_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Además,\. esa chica puede dejar fuera de combate instantáneamente a cualquier miembro que esté LLORANDO.\! Y como nunca hace daño directamente...\.se considera una habilidad no ofensiva.\! Muy gracioso, sinceramente.

adv_alice_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Bromas aparte,\. recuerda que \c[4]ciertas AFECCIONES impiden usar ciertas habilidades.\c[0].\! Aunque puede que ella sea un poco resistente a una,\. así que quizás necesites algo de SUERTE.

# After
adv_alice_a1:
    faceset: SideCharacters_ReverieFW
    faceindex: 25
    text: \n<FLARICA>Entonces, ¿Qué tal la hora de jugar con los osos?\! ¿Fue...\. osoportable?

#no hay manera de hacer el juego de palabra de oso con paciencia:sad:
adv_alice_a2:
    faceset: SideCharacters_ReverieFW
    faceindex: 25
    text: \n<FLARICA>Vale, eso fue un blanco fácil.\! Teneme paciencia.

# ======== NEAR ENTRANCE WIDOWBOY ========
adv_widow_1:
    faceset: SideCharacters_ReverieFW
    faceindex: 29
    text: \n<FLARICA>¿Sabes de la persona que parece una \sinv[1]araña\sinv[0] ahí abajo?\! Da miedo.

adv_widow_2:
    faceset: SideCharacters_ReverieFW
    faceindex: 31
    text: \n<FLARICA>Seré honesto contigo,\. no sé muy bien qué decir.\! Se ve bastante negativo.\! Vencer a niños deprimidos no es exactamente un pasatiempo mío.

adv_widow_3:
    faceset: SideCharacters_ReverieFW
    faceindex: 30
    text: \n<FLARICA>Pero...\. si de verdad quieres hablar con él...

adv_widow_4:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>Bueno,\. para empezar,\. las arañas son interminables aquí.\! Incluso si te deshaces de una,\. otra aparecera.

adv_widow_5:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>But hey,\. that's also a good thing.\! A turn used up to call them in,\. that's pretty crucial.

adv_widow_6:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>Adicionalmente,\. \c[4]los bichos y las plantas tienden a QUEMARSE muy fácilmente.\c[0]\! Mis lanzallamas no están a la venta,\. así que tendrás que hacer tu propio fuego.

# AFTER
adv_widow_a1:
    faceset: SideCharacters_ReverieFW
    faceindex: 28
    text: \n<FLARICA>Oh, ¿Así que lo hiciste entrar en razón?\! No me esperaba eso.

adv_widow_a2:
    faceset: SideCharacters_ReverieFW
    faceindex: 24
    text: \n<FLARICA>Honestamente pensé que simplemente irías a por un antisocial cualquiera.\. Supongo que debí haber esperado más de ti.